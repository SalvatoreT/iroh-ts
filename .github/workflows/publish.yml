name: Publish Package

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        # https://github.com/dtolnay/rust-toolchain/commit/3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crate/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crate/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install

      - run: pnpm build

      # Uses npm trusted publishing (OIDC via id-token permission) — no NPM_TOKEN needed.
      - run: npm publish --provenance --access public

  bump-patch:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push origin main
