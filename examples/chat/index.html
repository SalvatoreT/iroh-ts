<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iroh-ts Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    #status { padding: 12px 16px; background: #1a1a2e; font-size: 14px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 8px; }
    #state-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #999; }
    body[data-state="connecting"] #state-dot { background: #999; }
    body[data-state="connected"] #state-dot { background: #2ecc71; }
    body[data-state="disconnected"] #state-dot { background: #e74c3c; }
    body[data-state="reconnecting"] #state-dot { background: #f39c12; }
    #status-text { flex: 1; }
    #status-text a { color: #7b68ee; word-break: break-all; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 15px; }
    .msg.self { background: #2d2b55; align-self: flex-end; }
    .msg.peer { background: #1e1e1e; align-self: flex-start; }
    .msg.system { align-self: center; background: none; color: #666; font-style: italic; font-size: 13px; padding: 4px 8px; }
    .msg .meta { font-size: 11px; color: #888; margin-bottom: 2px; }
    #input-bar { display: flex; padding: 12px; gap: 8px; background: #1a1a2e; border-top: 1px solid #333; transition: opacity 0.2s; }
    body[data-state="disconnected"] #input-bar,
    body[data-state="reconnecting"] #input-bar { opacity: 0.5; }
    #input-bar input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #0a0a0a; color: #e0e0e0; font-size: 15px; }
    #input-bar button { padding: 10px 20px; border-radius: 6px; border: none; background: #7b68ee; color: white; font-size: 15px; cursor: pointer; }
    #input-bar button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body data-state="connecting">
  <div id="status"><span id="state-dot"></span><span id="status-text">Connecting...</span></div>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Type a message..." disabled />
    <button id="send-btn" disabled>Send</button>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
