<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iroh-ts Poker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: system-ui, sans-serif; background: #0d4a0d; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    #status { width: 100%; padding: 8px 16px; background: #062006; font-size: 13px; text-align: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
    #state-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #999; }
    body[data-state="connecting"] #state-dot { background: #999; }
    body[data-state="connected"] #state-dot { background: #2ecc71; }
    body[data-state="disconnected"] #state-dot { background: #e74c3c; }
    body[data-state="reconnecting"] #state-dot { background: #f39c12; }
    #status-text a { color: #90ee90; word-break: break-all; }

    #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: auto; padding: 12px; gap: 8px; }

    #table { padding: 20px 28px; background: #1a6b1a; border-radius: 80px; border: 6px solid #3d2b1f; width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    #community { display: flex; gap: 6px; min-height: 60px; align-items: center; justify-content: center; flex-wrap: wrap; }
    #pot { font-size: 16px; color: #ffd700; }

    #hand-label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    #hand { display: flex; gap: 6px; align-items: center; justify-content: center; }

    #players { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .player-info { background: #062006; padding: 6px 12px; border-radius: 8px; text-align: center; font-size: 12px; }
    .player-info.current { border: 2px solid #ffd700; }
    .player-info.folded { opacity: 0.4; }

    #result { font-size: 18px; color: #ffd700; text-align: center; min-height: 24px; }

    #action-bar { flex-shrink: 0; width: 100%; background: #062006; border-top: 2px solid #0a300a; padding: 10px 16px; display: none; }
    #action-bar .action-inner { display: flex; gap: 8px; justify-content: center; align-items: center; max-width: 480px; margin: 0 auto; }
    #action-bar button { padding: 12px 24px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; flex: 1; max-width: 140px; }
    #action-bar button:disabled { opacity: 0.4; cursor: default; }
    .btn-bet { background: #ffd700; color: #000; }
    .btn-check { background: #4a90d9; color: white; }
    .btn-fold { background: #c0392b; color: white; }
    #bet-amount { width: 70px; padding: 10px 8px; border-radius: 8px; border: 1px solid #444; background: #0d4a0d; color: #e0e0e0; font-size: 14px; text-align: center; }

    playing-card { display: inline-block; width: clamp(52px, 13vw, 120px); }
    playing-card img { width: 100%; height: auto; display: block; }

    /* Mobile: shrink cards and tighten spacing */
    @media (max-width: 480px) {
      #table { padding: 12px 14px; border-radius: 40px; border-width: 4px; }
      #community { gap: 4px; min-height: 44px; }
      #hand { gap: 4px; }
      #pot { font-size: 14px; }
      #game-area { padding: 6px; gap: 4px; }
      #players { gap: 6px; }
      .player-info { padding: 4px 8px; font-size: 11px; }
      #result { font-size: 15px; }
      #action-bar button { padding: 10px 16px; font-size: 14px; }
      #bet-amount { width: 60px; padding: 8px 6px; font-size: 13px; }
    }

    #new-hand-bar { display: none; flex-shrink: 0; width: 100%; background: #062006; border-top: 2px solid #0a300a; padding: 10px 16px; text-align: center; }
    #new-hand-bar button { padding: 12px 32px; border-radius: 8px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; background: #2ecc71; color: #fff; }
  </style>
</head>
<body data-state="connecting">
  <div id="status"><span id="state-dot"></span><span id="status-text">Loading...</span></div>
  <div id="game-area">
    <div id="table">
      <div id="community"></div>
      <div id="pot"></div>
    </div>
    <div id="hand-label">Your Hand</div>
    <div id="hand"></div>
    <div id="players"></div>
    <div id="result"></div>
  </div>
  <div id="new-hand-bar">
    <button id="btn-new-hand">New Hand</button>
  </div>
  <div id="action-bar">
    <div class="action-inner">
      <input id="bet-amount" type="number" value="50" min="1" />
      <button class="btn-bet" id="btn-bet">Bet</button>
      <button class="btn-check" id="btn-check">Check</button>
      <button class="btn-fold" id="btn-fold">Fold</button>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
