<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iroh-ts Poker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d4a0d; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    #status { width: 100%; padding: 12px 16px; background: #062006; font-size: 14px; text-align: center; }
    #status a { color: #90ee90; word-break: break-all; }
    #table { margin: 24px; padding: 32px; background: #1a6b1a; border-radius: 120px; border: 8px solid #3d2b1f; min-width: 600px; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #community { display: flex; gap: 8px; min-height: 80px; align-items: center; }
    #pot { font-size: 18px; color: #ffd700; }
    #hand { display: flex; gap: 8px; margin: 16px; min-height: 80px; align-items: center; }
    #players { display: flex; gap: 16px; margin: 16px; flex-wrap: wrap; justify-content: center; }
    .player-info { background: #062006; padding: 8px 16px; border-radius: 8px; text-align: center; font-size: 13px; }
    .player-info.current { border: 2px solid #ffd700; }
    .player-info.folded { opacity: 0.4; }
    #actions { display: flex; gap: 8px; margin: 16px; }
    #actions button { padding: 10px 24px; border-radius: 6px; border: none; font-size: 15px; cursor: pointer; }
    #actions button:disabled { opacity: 0.4; cursor: default; }
    .btn-bet { background: #ffd700; color: #000; }
    .btn-check { background: #4a90d9; color: white; }
    .btn-fold { background: #c0392b; color: white; }
    #bet-amount { width: 80px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #062006; color: #e0e0e0; font-size: 14px; }
    #result { font-size: 20px; color: #ffd700; margin: 16px; text-align: center; }
    playing-card { --card-width: 70px; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="table">
    <div id="community"></div>
    <div id="pot"></div>
  </div>
  <div id="hand"></div>
  <div id="players"></div>
  <div id="actions" style="display:none">
    <input id="bet-amount" type="number" value="50" min="1" />
    <button class="btn-bet" id="btn-bet">Bet</button>
    <button class="btn-check" id="btn-check">Check</button>
    <button class="btn-fold" id="btn-fold">Fold</button>
  </div>
  <div id="result"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
